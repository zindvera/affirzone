<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Affirzone</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --brand-color: #23b48e;
            --brand-hover: #1e9d7c;
            --bg-light: #fafafa;
            --text-main: #1a1a1a;
            --text-muted: #6c757d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .text-brand { color: var(--brand-color); }
        .bg-brand { background-color: var(--brand-color); color: white; }
        .bg-brand:hover { background-color: var(--brand-hover); color: white; }

        .container-custom {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 15px;
        }
        @media (min-width: 768px) {
            .container-custom { padding: 0 40px; }
        }

        /* Top Accent Bar */
        .accent-bar {
            height: 4px;
            background: linear-gradient(90deg, #23b48e, #2c8be4);
            width: 100%;
        }

        /* Simple Navigation */
        .simple-nav {
            background-color: #fff;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        
        .simple-nav a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        
        .simple-nav a:hover {
            color: var(--brand-color);
        }

        /* Search Header */
        .search-header {
            padding: 5rem 15px 4rem;
            background-color: #fff;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            text-align: center;
        }

        .search-input-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px;
            padding-right: 60px;
            border-radius: 50px;
            border: 2px solid #eaeaea;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .search-input:focus {
            border-color: var(--brand-color);
            box-shadow: 0 8px 25px rgba(35,180,142,0.1);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--brand-color);
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: var(--brand-hover);
        }

        /* Vertical Feed Wrapper */
        .feed-card-wrapper {
            width: 100%;
            max-width: 720px;
            margin: 0 auto 3rem auto;
        }
        @media (min-width: 768px) {
            .feed-card-wrapper { margin-bottom: 4rem; }
        }

        /* Result Cards */
        .custom-card {
            background: #fff;
            border-radius: 1rem;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: auto; 
            overflow: hidden;
            text-decoration: none;
            color: var(--text-main);
        }

        .custom-card:hover {
            box-shadow: 0 12px 40px rgba(35,180,142,0.08);
        }

        /* Lazy Loading & Skeleton */
        .skeleton-bg {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
        }
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Edge-to-Edge Mobile Layout */
        @media (max-width: 767px) {
            main.container-custom {
                padding-left: 0;
                padding-right: 0;
            }
            .feed-card-wrapper {
                margin-bottom: 2rem;
            }
            .custom-card {
                border-radius: 0; /* Flat edges on mobile */
                border-left: none;
                border-right: none;
            }
            #search-status {
                padding-left: 15px;
                padding-right: 15px;
            }
        }

        /* Pill Buttons (For fallbacks) */
        .btn-pill {
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #e5e5e5;
            background: #fff;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-pill.active {
            background: var(--text-main);
            color: #fff;
            border-color: var(--text-main);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Footer push */
        main { flex: 1; }
    </style>
</head>
<body>

    <!-- Top Accent Bar -->
    <div class="accent-bar"></div>

    <!-- Simple Navigation (No Logo) -->
    <nav class="simple-nav">
        <a href="index.html">Home</a>
      
        <a href="products.html">Products</a>
    </nav>

    <!-- Header & Search Area -->
    <header class="search-header">
        <div class="container-custom">
            <!-- Medium Centered Logo -->
            <img src="https://affirzone.store/media/Affirzone-logo.png" alt="Affirzone Logo" style="height: 48px; margin-bottom: 2.5rem; opacity: 0.9;">
            
            <!-- Search Form -->
            <form id="search-form" class="search-input-wrapper" onsubmit="handleSearch(event)">
                <input type="text" id="search-input" class="search-input" placeholder="Search for journals, gratitude, confidence..." autocomplete="off">
                <button type="submit" class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        </div>
    </header>

    <!-- Main Content: Search Results -->
    <main class="container-custom py-5">
        <div id="search-status" class="mb-4 text-center">
            <!-- Dynamic status text injected here -->
        </div>

        <div class="d-flex flex-column align-items-center w-100" id="results-grid">
            <!-- Search results injected here as vertical feed cards -->
        </div>
    </main>

    <!-- Footer -->
    <footer id="about" class="text-center text-white py-5 px-3" style="background-color: #1a1a1a;">
        <img src="https://affirzone.store/media/Affirzone-logo.png" alt="Affirzone" height="32" class="mb-4" style="filter: brightness(0) invert(1) opacity(0.8);">
        <p class="text-white mx-auto mb-5" style="max-width: 24rem; font-size: 1rem; line-height: 1.6; opacity: 0.9;">
            Providing mindful tools for high-resolution minimal stationery and clear daily routines.
        </p>
        <div class="d-flex justify-content-center gap-4 mb-5" style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            <a href="#" class="text-white text-decoration-none" style="opacity: 0.9;">Instagram</a>
            <a href="#" class="text-white text-decoration-none" style="opacity: 0.9;">Pinterest</a>
            <a href="#" class="text-white text-decoration-none" style="opacity: 0.9;">Contact</a>
        </div>
        <div class="pt-4 text-white" style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7;">
            © <script>document.write(new Date().getFullYear())</script> Affirzone. All rights reserved.
        </div>
    </footer>

    <!-- Search Logic -->
    <script>
        let topicsData = [];

        async function initSearch() {
            // 1. Fetch Topics Data
            try {
                const response = await fetch('data/topics/list.json');
                if (response.ok) {
                    topicsData = await response.json();
                } else {
                    console.error("Failed to load topics data.");
                }
            } catch (error) {
                console.error("Error fetching JSON:", error);
            }

            // 2. Read URL Parameter
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');

            if (query && query.trim() !== '') {
                document.getElementById('search-input').value = query;
                performFuzzySearch(query);
            } else {
                document.getElementById('search-status').innerHTML = `
                    <h5 class="text-muted fw-normal font-serif">Enter a topic above to start searching.</h5>
                `;
            }
        }

        function handleSearch(event) {
            event.preventDefault(); // Prevent standard form submission
            const inputVal = document.getElementById('search-input').value.trim();
            
            if (inputVal !== '') {
                // Update URL and reload
                window.location.href = `search.html?q=${encodeURIComponent(inputVal).replace(/%20/g, '+')}`;
            }
        }

        // --- FUZZY SEARCH UTILITIES ---
        
        // Calculate Levenshtein Distance (Edit Distance)
        function getEditDistance(a, b) {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1, // substitution
                            Math.min(matrix[i][j - 1] + 1, // insertion
                            matrix[i - 1][j] + 1) // deletion
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        // Fuzzy match scoring function
        function fuzzyMatchScore(term, text) {
            if (!text) return 0;
            if (text.includes(term)) return 10; // Exact substring match gets highest base score
            
            // Break text into clean words for fuzzy comparison
            const words = text.split(/[\s,.-]+/);
            let bestScore = 0;
            
            for (let word of words) {
                if (word.length < 3) continue; // Skip tiny words
                
                const distance = getEditDistance(term, word);
                // Allow 1 typo for short words, up to 2 for longer ones
                const maxErrors = term.length <= 4 ? 1 : 2;
                
                if (distance <= maxErrors) {
                    if (distance === 0) bestScore = Math.max(bestScore, 10);
                    else if (distance === 1) bestScore = Math.max(bestScore, 5); // 1 typo
                    else bestScore = Math.max(bestScore, 2); // 2 typos
                }
            }
            return bestScore;
        }

        function performFuzzySearch(query) {
            const statusEl = document.getElementById('search-status');
            const gridEl = document.getElementById('results-grid');
            gridEl.innerHTML = ''; // Clear previous results

            // Normalize search terms
            const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 1);

            if (terms.length === 0 || topicsData.length === 0) {
                statusEl.innerHTML = `<h5 class="text-muted fw-normal font-serif">No results found for "<span class="text-dark fw-semibold">${query}</span>".</h5>`;
                return;
            }

            // Score items based on fuzzy matches in URL and Category
            const scoredResults = topicsData.map(item => {
                let score = 0;
                // Create a readable title from the URL (replace + with space)
                const readableTitle = (item.url || "").replace(/\+/g, ' ').toLowerCase();
                const category = (item.category || "").toLowerCase(); 

                terms.forEach(term => {
                    // Check against fuzzy matcher
                    const titleScore = fuzzyMatchScore(term, readableTitle);
                    const catScore = fuzzyMatchScore(term, category);

                    // Multipliers
                    if (titleScore > 0) score += titleScore * 5;  // Max importance
                    if (catScore > 0) score += catScore * 3;      // Medium importance
                });

                return { item, score };
            });

            // Filter out zero scores, sort by highest score, limit to Max 6
            const topResults = scoredResults
                .filter(res => res.score > 0)
                .sort((a, b) => b.score - a.score)
                .map(res => res.item)
                .slice(0, 6);

            // Render Results
            if (topResults.length > 0) {
                statusEl.innerHTML = `<h5 class="text-muted fw-normal font-serif mb-5">Showing top ${topResults.length} results for "<span class="text-dark fw-semibold">${query}</span>"</h5>`;
                
                let html = '';
                topResults.forEach(blog => {
                    const rawUrl = blog.url || '';
                    const safeQuery = rawUrl.split('+').map(part => encodeURIComponent(part)).join('+');
                    const dynamicUrl = `show.html?title=${safeQuery}`;
                    const safeId = rawUrl.replace(/[^a-zA-Z0-9]/g, '-');
                    
                    html += `
                        <div class="feed-card-wrapper">
                            <a href="${dynamicUrl}" id="blog-card-${safeId}" class="text-dark text-decoration-none d-block overflow-visible" style="transition: transform 0.3s ease;">
                                <div class="custom-card skeleton-bg w-100" style="min-height: 450px; display: flex; align-items: center; justify-content: center;">
                                    <span class="text-muted fw-semibold" style="opacity: 0.6; font-size: 14px; letter-spacing: 1px; text-transform: uppercase;">Loading Prompt UI...</span>
                                </div>
                            </a>
                        </div>
                    `;
                });
                
                gridEl.innerHTML = html;

                // Fetch actual UI JSON for matched blogs
                topResults.forEach(blog => {
                    fetchAndRenderBlog(blog);
                });

            } else {
                statusEl.innerHTML = `
                    <h5 class="text-muted fw-normal font-serif mb-3">No results found for "<span class="text-dark fw-semibold">${query}</span>".</h5>
                    <p class="text-muted" style="font-size: 14px;">Try searching with different keywords like 'gratitude', 'healing', or 'career'.</p>
                `;
            }
        }

        // ==========================================
        // ASYNC JSON UI FETCHER FOR BLOGS
        // ==========================================
        async function fetchAndRenderBlog(blog) {
            const rawUrl = blog.url || '';
            const safeId = rawUrl.replace(/[^a-zA-Z0-9]/g, '-');
            
            try {
                // Encode '+' as '%2B' to ensure local servers don't interpret them as spaces
                const safePath = rawUrl.replace(/\+/g, '%2B');
                const response = await fetch(`data/list/${safePath}.json`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const rawData = await response.json();
                
                // Smart check to handle if JSON is an array
                const data = Array.isArray(rawData) ? rawData[0] : rawData;

                if (!data || !data.css || !data.html) {
                    throw new Error('JSON is missing required css or html keys');
                }
                
                // Parse HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.html, 'text/html');
                
                // Remove description completely for the feed
                const descContainer = doc.querySelector('.description-container');
                if (descContainer) {
                    descContainer.remove();
                }

                // Limit prompts to 3
                const promptItems = doc.querySelectorAll('.prompt-item');
                let remaining = 0;
                promptItems.forEach((item, index) => {
                    if (index >= 3) {
                        item.remove();
                        remaining++;
                    }
                });
                
                // Add '+n more prompts' casual text
                if (remaining > 0) {
                    const promptList = doc.querySelector('.prompt-list');
                    if (promptList) {
                        const textContainer = doc.createElement('div');
                        textContainer.className = 'text-center mt-3 pb-2';
                        textContainer.innerHTML = `<span style="color: #6c757d; font-size: 1.05rem; font-style: italic; font-weight: 500;">+ ${remaining} more prompts. Click to read the full list.</span>`;
                        promptList.appendChild(textContainer);
                    }
                }
                
                // Inject Scoped CSS
                if (!document.getElementById(`css-${safeId}`)) {
                    const style = document.createElement('style');
                    style.id = `css-${safeId}`;
                    
                    // Smart CSS scoping: target both #dynamic-content AND .prompt-card base classes to prevent global bleeding
                    let scopedCss = data.css.replace(/#dynamic-content/g, `#blog-card-${safeId}`);
                    // Only scope .prompt-card if it's the root definition to avoid double prefixing
                    if (!scopedCss.includes(`#blog-card-${safeId}`)) {
                         scopedCss = scopedCss.replace(/\.prompt-card/g, `#blog-card-${safeId} .prompt-card`);
                    }
                    
                    style.innerHTML = scopedCss;
                    document.head.appendChild(style);
                }
                
                // Render into outer container
                const container = document.getElementById(`blog-card-${safeId}`);
                if (container) {
                    container.innerHTML = doc.body.innerHTML;
                    
                    // Add subtle hover lift effect to inner HTML
                    container.addEventListener('mouseenter', () => {
                        const card = container.querySelector('.prompt-card');
                        if (card) {
                            card.style.transform = 'scale(1.02)';
                            card.style.transition = 'transform 0.3s ease';
                        }
                    });
                    container.addEventListener('mouseleave', () => {
                        const card = container.querySelector('.prompt-card');
                        if (card) card.style.transform = 'scale(1)';
                    });
                }
            } catch (error) {
                console.error("Failed to load JSON UI for blog:", rawUrl, error);
                
                // Fallback: If JSON fetch fails, show a clean title placeholder
                const container = document.getElementById(`blog-card-${safeId}`);
                if (container) {
                    const fallbackTitle = rawUrl.replace(/\+/g, ' ');
                    container.innerHTML = `
                        <div class="custom-card w-100 p-5 text-center" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; background: #fff;">
                            <h3 class="font-serif fw-medium mb-4 text-capitalize" style="font-size: 1.5rem; line-height: 1.3;">${fallbackTitle}</h3>
                            <span class="btn-pill active" style="font-size: 13px;">Read Prompts <i class="fa-solid fa-arrow-right ms-2"></i></span>
                        </div>
                    `;
                }
            }
        }

        // Initialize on page load
        window.onload = initSearch;
    </script>
</body>
</html>
