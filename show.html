    <!-- Application Logic -->
    <script>
        // ==========================================
        // DATA ARRAYS
        // ==========================================
        let productsData = [];
        let promptListData = [];

        // ==========================================
        // STATE VARIABLES
        // ==========================================
        let currentBlogCategories = []; 
        let currentPage = 1;
        const itemsPerPage = 12; 
        let cardFormats = {}; 

        // ==========================================
        // INITIALIZATION & FETCHING LOGIC
        // ==========================================
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const titleParam = params.get('title');
            const pageParam = parseInt(params.get('page'));
            
            if (pageParam && !isNaN(pageParam)) currentPage = pageParam;

            if (!titleParam) {
                showError("No prompt specified. Please select a prompt from the homepage.");
                return;
            }

            const rawTitleMatch = window.location.search.match(/[?&]title=([^&]+)/);
            if (rawTitleMatch) {
                const rawParam = rawTitleMatch[1];
                if (rawParam.includes('%20') || rawParam.includes('%2B')) {
                    showError("Invalid link format. Please use literal '+' instead of spaces or encoded characters.");
                    return;
                }
            }

            try {
                const fileName = titleParam.replace(/ /g, '+');
                const response = await fetch(`data/list/${fileName}.json`);
                
                if (!response.ok) throw new Error('File not found');
                
                let data = await response.json();
                if (Array.isArray(data)) data = data[0];
                
                document.title = `${titleParam.replace(/\+/g, ' ')} - Affirzone`;
                let metaDescription = document.querySelector('meta[name="description"]');
                if (metaDescription && data.description) {
                    metaDescription.setAttribute('content', data.description);
                }

                document.getElementById('dynamic-styles').innerHTML = data.css || '';
                document.getElementById('dynamic-content').innerHTML = data.html || '';

                const descContainer = document.querySelector('#dynamic-content .description-container');
                if (descContainer) {
                    const paragraphs = Array.from(descContainer.querySelectorAll('.description-text'));
                    
                    let totalWords = 0;
                    const paragraphsData = paragraphs.map(p => {
                        const text = p.innerText.trim();
                        const words = text ? text.split(/\s+/).filter(w => w.length > 0) : []; 
                        totalWords += words.length;
                        return { element: p, originalHTML: p.innerHTML, words: words };
                    });

                    let wordLimit = 15;
                    let shouldTruncate = true;

                    if (data.cut_desc === "none") {
                        shouldTruncate = false;
                    } else if (data.cut_desc !== undefined && data.cut_desc !== null) {
                        wordLimit = parseInt(data.cut_desc, 10);
                    }
                    
                    if (shouldTruncate && totalWords > wordLimit && !isNaN(wordLimit)) {
                        const renderTruncated = () => {
                            let currentWordCount = 0;
                            let limitReached = false;
                            paragraphsData.forEach((pData, index) => {
                                const p = pData.element;
                                p.style.setProperty('display', 'block', 'important'); 
                                p.style.display = ''; 
                                p.classList.remove('d-none');

                                if (limitReached) {
                                    p.style.setProperty('display', 'none', 'important');
                                    p.classList.add('d-none');
                                    return;
                                }

                                if (currentWordCount + pData.words.length <= wordLimit) {
                                    currentWordCount += pData.words.length;
                                    p.innerHTML = pData.originalHTML;
                                    if (currentWordCount === wordLimit && index < paragraphsData.length - 1) {
                                        limitReached = true;
                                        appendReadMore(p);
                                    }
                                } else {
                                    const allowedWords = wordLimit - currentWordCount;
                                    p.innerText = pData.words.slice(0, allowedWords).join(' ') + '... ';
                                    limitReached = true;
                                    appendReadMore(p);
                                }
                            });
                        };

                        const renderFull = () => {
                            paragraphsData.forEach((pData, index) => {
                                const p = pData.element;
                                p.innerHTML = pData.originalHTML;
                                p.style.setProperty('display', 'block', 'important');
                                p.style.display = '';
                                p.classList.remove('d-none');
                                if (index === paragraphsData.length - 1) appendReadLess(p);
                            });
                        };

                        const appendReadMore = (element) => {
                            const btn = document.createElement('a');
                            btn.href = '#';
                            btn.className = 'text-brand fw-bold text-decoration-none ms-1';
                            btn.style.fontSize = '0.9em';
                            btn.innerText = 'Read More';
                            btn.onclick = (e) => { e.preventDefault(); renderFull(); };
                            element.appendChild(document.createTextNode(' '));
                            element.appendChild(btn);
                        };

                        const appendReadLess = (element) => {
                            const btn = document.createElement('a');
                            btn.href = '#';
                            btn.className = 'text-brand fw-bold text-decoration-none ms-1';
                            btn.style.fontSize = '0.9em';
                            btn.innerText = 'Read Less';
                            btn.onclick = (e) => { 
                                e.preventDefault(); renderTruncated(); 
                                descContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                            };
                            element.appendChild(document.createTextNode(' '));
                            element.appendChild(btn);
                        };

                        renderTruncated();
                    }
                }

                await insertPromoAds();

                document.getElementById('related-section').style.display = 'block';

            } catch (error) {
                console.error(error);
                showError("We couldn't find the prompt list you're looking for.");
                return; 
            }

            try {
                const [productsRes, topicsRes] = await Promise.all([
                    fetch('data/products/list.json'),
                    fetch('data/topics/list.json')
                ]);
                
                if (productsRes.ok) productsData = await productsRes.json();
                if (topicsRes.ok) promptListData = await topicsRes.json();
            } catch (error) {
                console.log("Could not load external feed data.");
            }

            renderRelatedFeed();
        }

        function showError(msg) {
            document.getElementById('dynamic-content').innerHTML = `
                <div class="text-center py-5 my-5 px-3">
                    <div class="mb-4"><i class="fa-regular fa-file-lines text-muted" style="font-size: 3rem; opacity: 0.5;"></i></div>
                    <h2 class="font-serif fw-bold mb-3" style="color: #1a1a1a;">${msg}</h2>
                    <a href="index.html" class="btn btn-dark rounded-pill px-4 py-2 mt-3 font-semibold" style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Return to Home</a>
                </div>
            `;
            document.getElementById('related-section').style.display = 'none';
        }

        // ==========================================
        // COOKIE TRACKING UTILITIES
        // ==========================================
        function getSeenAds() {
            const match = document.cookie.match(/(^| )ad_seen=([^;]+)/);
            if (match && match[2]) return match[2].split(',');
            return [];
        }

        function addSeenAd(id) {
            let seen = getSeenAds();
            if (!seen.includes(id)) {
                seen.push(id);
                document.cookie = `ad_seen=${seen.join(',')};path=/;max-age=2592000`; 
            }
        }

        function resetSeenAds() {
            document.cookie = `ad_seen=;path=/;max-age=0`; 
        }

        const adObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const adId = entry.target.getAttribute('data-promo-id');
                    if (adId) {
                        addSeenAd(adId);
                        observer.unobserve(entry.target); 
                    }
                }
            });
        }, { threshold: 0.5 }); 

        // ==========================================
        // PROMO AD INJECTION
        // ==========================================
        async function insertPromoAds() {
            try {
                const response = await fetch('data/promo/list.json');
                if (!response.ok) return;
                
                const promos = await response.json();
                if (!promos || !Array.isArray(promos) || promos.length === 0) return;

                const promptItems = document.querySelectorAll('#dynamic-content .prompt-item');
                const count = promptItems.length;

                const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
                const getAdHtml = (promo) => typeof promo === 'string' ? promo : (promo.html || '');

                let seenAds = getSeenAds();
                let availablePromos = promos.filter(p => !seenAds.includes(p.id));

                if (availablePromos.length === 0) {
                    resetSeenAds();
                    availablePromos = [...promos];
                }

                const popRandomPromo = () => {
                    if (availablePromos.length === 0) return null;
                    const idx = Math.floor(Math.random() * availablePromos.length);
                    return availablePromos.splice(idx, 1)[0];
                };

                if (count >= 10) {
                    const insertPos1 = getRandomInt(5, 7) - 1; 
                    if (promptItems[insertPos1]) {
                        const adPromo1 = popRandomPromo() || promos[0];
                        const adDiv1 = document.createElement('div');
                        adDiv1.className = 'w-100 my-4 promo-ad-container px-3';
                        adDiv1.setAttribute('data-promo-id', adPromo1.id);
                        adDiv1.innerHTML = getAdHtml(adPromo1);
                        promptItems[insertPos1].insertAdjacentElement('afterend', adDiv1);
                        adObserver.observe(adDiv1); 
                    }
                }

                if (count >= 20) {
                    const insertPos2 = getRandomInt(14, 16) - 1; 
                    if (promptItems[insertPos2]) {
                        const adPromo2 = popRandomPromo() || promos[0];
                        const adDiv2 = document.createElement('div');
                        adDiv2.className = 'w-100 my-4 promo-ad-container px-3';
                        adDiv2.setAttribute('data-promo-id', adPromo2.id);
                        adDiv2.innerHTML = getAdHtml(adPromo2);
                        promptItems[insertPos2].insertAdjacentElement('afterend', adDiv2);
                        adObserver.observe(adDiv2); 
                    }
                }
            } catch (err) {
                console.log("No promo ads loaded or promo list missing.");
            }
        }

        // ==========================================
        // DYNAMIC RELATED FEED GENERATION
        // ==========================================
        function renderRelatedFeed() {
            const grid = document.getElementById('related-grid');
            const pagination = document.getElementById('related-pagination');
            let html = '';

            const params = new URLSearchParams(window.location.search);
            const titleParam = params.get('title') || "";
            const currentUrlKey = titleParam.replace(/ /g, '+');

            const masterBlogMatch = promptListData.find(b => b.url === currentUrlKey);

            if (masterBlogMatch && masterBlogMatch.category) {
                currentBlogCategories = masterBlogMatch.category.split(',').map(c => c.trim().toLowerCase());
            }

            // 1. Get related blogs (exclude current by URL, match category)
            let relatedBlogs = promptListData.filter(b => {
                if (!b.url || b.url === currentUrlKey) return false; 
                if (!b.category) return false;
                
                const cats = b.category.split(',').map(c => c.trim().toLowerCase());
                return cats.some(c => currentBlogCategories.includes(c));
            });

            // Restrict exactly up to 4 blogs logic:
            if (relatedBlogs.length > 4) {
                relatedBlogs = relatedBlogs.slice(0, 4);
            } else if (relatedBlogs.length < 4) {
                // Fill the rest with random available prompts
                let pool = promptListData.filter(b => 
                    b.url && b.url !== currentUrlKey && 
                    !relatedBlogs.some(rb => rb.url === b.url)
                );
                pool = pool.sort(() => 0.5 - Math.random());
                const needed = 4 - relatedBlogs.length;
                relatedBlogs = [...relatedBlogs, ...pool.slice(0, needed)];
            }

            // 2. Get related products
            let relatedProducts = productsData.filter(p => {
                if (!p.target_prompt) return true; 
                const targets = p.target_prompt.split(',').map(t => t.trim().toLowerCase());
                return targets.some(t => currentBlogCategories.includes(t));
            });

            // 3. Interleave (3 blogs, 1 product)
            let combinedItems = [];
            let bIdx = 0, pIdx = 0;
            while (bIdx < relatedBlogs.length || pIdx < relatedProducts.length) {
                for(let i = 0; i < 3 && bIdx < relatedBlogs.length; i++) {
                    combinedItems.push({ type: 'blog', data: relatedBlogs[bIdx++] });
                }
                if (pIdx < relatedProducts.length) {
                    combinedItems.push({ type: 'product', data: relatedProducts[pIdx++] });
                }
            }

            const totalPages = Math.ceil(combinedItems.length / itemsPerPage);
            const indexOfLastItem = currentPage * itemsPerPage;
            const indexOfFirstItem = indexOfLastItem - itemsPerPage;
            const currentItems = combinedItems.slice(indexOfFirstItem, indexOfLastItem);

            currentItems.forEach(item => {
                if (item.type === 'blog') {
                    html += `
                        <div class="feed-card-wrapper">
                            ${generateBlogHtml(item.data)}
                        </div>
                    `;
                } else if (item.type === 'product') {
                    html += `
                        <div class="feed-card-wrapper">
                            ${generateProductHtml(item.data, 'digital')}
                        </div>
                    `;
                }
            });

            grid.innerHTML = html;

            currentItems.forEach(item => {
                if (item.type === 'blog') {
                    fetchAndRenderBlog(item.data);
                }
            });

            if (totalPages > 1) {
                pagination.innerHTML = `
                    <button onclick="changePage(${currentPage - 1})" class="btn btn-outline-custom rounded-pill px-4 py-2 mx-2" style="font-size: 14px;" ${currentPage === 1 ? 'disabled style="opacity:0.3"' : ''}>
                        <i class="fa-solid fa-chevron-left me-2"></i> Previous
                    </button>
                    <button onclick="changePage(${currentPage + 1})" class="btn btn-outline-custom rounded-pill px-4 py-2 mx-2" style="font-size: 14px;" ${currentPage === totalPages ? 'disabled style="opacity:0.3"' : ''}>
                        Next <i class="fa-solid fa-chevron-right ms-2"></i>
                    </button>
                `;
            }
        }

        function changePage(page) {
            currentPage = page;
            const url = new URL(window.location);
            url.searchParams.set('page', page);
            window.history.pushState({}, '', url);
            document.getElementById('related-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
            renderRelatedFeed();
        }

        // ==========================================
        // TEMPLATE GENERATORS FOR FEED
        // ==========================================
        function generateBlogHtml(blog) {
            // Only rely on URL
            const rawQuery = blog.url || '';
            const safeQuery = rawQuery.split('+').map(part => encodeURIComponent(part)).join('+');
            const dynamicUrl = `show.html?title=${safeQuery}`;
            const safeId = rawQuery.replace(/[^a-zA-Z0-9]/g, '-');
            
            return `
                <a href="${dynamicUrl}" id="blog-card-${safeId}" class="custom-card text-dark skeleton-bg text-decoration-none d-block p-0 overflow-hidden" style="transition: transform 0.3s ease;">
                    <div class="w-100" style="min-height: 450px; display: flex; align-items: center; justify-content: center;">
                        <span class="text-muted fw-semibold" style="opacity: 0.6; font-size: 14px; letter-spacing: 1px; text-transform: uppercase;">Loading Prompt UI...</span>
                    </div>
                </a>
            `;
        }

        async function fetchAndRenderBlog(blog) {
            const rawUrl = blog.url || '';
            const safeId = rawUrl.replace(/[^a-zA-Z0-9]/g, '-');
            try {
                const safePath = rawUrl.replace(/\+/g, '%2B');
                const response = await fetch(`data/list/${safePath}.json`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const rawData = await response.json();
                const data = Array.isArray(rawData) ? rawData[0] : rawData;

                if (!data || !data.css || !data.html) {
                    throw new Error('JSON is missing required css or html keys');
                }
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.html, 'text/html');
                
                const descContainer = doc.querySelector('.description-container');
                if (descContainer) descContainer.remove();

                const promptItems = doc.querySelectorAll('.prompt-item');
                let remaining = 0;
                promptItems.forEach((item, index) => {
                    if (index >= 3) {
                        item.remove();
                        remaining++;
                    }
                });
                
                if (remaining > 0) {
                    const promptList = doc.querySelector('.prompt-list');
                    if (promptList) {
                        const textContainer = doc.createElement('div');
                        textContainer.className = 'text-center mt-3 pb-2';
                        textContainer.innerHTML = `<span style="color: #6c757d; font-size: 1.05rem; font-style: italic; font-weight: 500;">+ ${remaining} more prompts. Click to read the full list.</span>`;
                        promptList.appendChild(textContainer);
                    }
                }
                
                const innerCard = doc.querySelector('.prompt-card');
                if (innerCard) {
                    innerCard.style.setProperty('margin', '0', 'important');
                    innerCard.style.setProperty('border-radius', '0', 'important'); 
                    innerCard.style.setProperty('box-shadow', 'none', 'important'); 
                    innerCard.style.setProperty('max-width', '100%', 'important');
                    innerCard.style.setProperty('width', '100%', 'important');
                }

                if (!document.getElementById(`css-${safeId}`)) {
                    const style = document.createElement('style');
                    style.id = `css-${safeId}`;
                    style.innerHTML = data.css.replace(/#dynamic-content/g, `#blog-card-${safeId}`);
                    document.head.appendChild(style);
                }
                
                const container = document.getElementById(`blog-card-${safeId}`);
                if (container) {
                    container.innerHTML = doc.body.innerHTML;
                    container.classList.remove('skeleton-bg'); 
                    
                    container.addEventListener('mouseenter', () => {
                        const card = container.querySelector('.prompt-card');
                        if (card) {
                            card.style.transform = 'scale(1.02)';
                            card.style.transition = 'transform 0.3s ease';
                        }
                    });
                    container.addEventListener('mouseleave', () => {
                        const card = container.querySelector('.prompt-card');
                        if (card) card.style.transform = 'scale(1)';
                    });
                }
            } catch (error) {
                console.error("Failed to load JSON UI for blog:", rawUrl, error);
                
                const container = document.getElementById(`blog-card-${safeId}`);
                if (container) {
                    container.classList.remove('skeleton-bg');
                    // Fallback to title from URL
                    const fallbackTitle = rawUrl.replace(/\+/g, ' ');
                    container.innerHTML = `
                        <div class="w-100 p-5 text-center" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; background: #fff;">
                            <h3 class="font-serif fw-medium mb-4 text-capitalize" style="font-size: 1.5rem; line-height: 1.3;">${fallbackTitle}</h3>
                            <span class="btn-pill active" style="font-size: 13px;">Read Prompts <i class="fa-solid fa-arrow-right ms-2"></i></span>
                        </div>
                    `;
                }
            }
        }

        function generateProductHtml(product, defaultFormat) {
            if (!cardFormats[product.groupId]) {
                cardFormats[product.groupId] = defaultFormat;
            }
            
            let currentFormat = cardFormats[product.groupId];
            let isKDP = currentFormat === 'kdp';
            let data = product[currentFormat];
            
            let html = `
                <div class="custom-card position-relative" style="padding: 0.75rem;">
            `;

            html += `
                <div class="d-flex border-bottom mx-1 mb-4">
                    <button onclick="setCardFormat('${product.groupId}', 'digital')" class="flex-fill format-toggle ${!isKDP ? 'active' : ''}">Goodnotes PDF</button>
                    <button onclick="setCardFormat('${product.groupId}', 'kdp')" class="flex-fill format-toggle ${isKDP ? 'active' : ''}">Amazon KDP</button>
                </div>
            `;

            let carouselId = `carousel-${product.groupId}-grid`;
            html += `
                <div class="carousel-wrapper mb-4 px-1">
                    <div id="${carouselId}" class="d-flex overflow-x-auto hide-scrollbar snap-container" style="gap: 12px; padding-bottom: 4px;">
            `;
            
            product.images.forEach((src, idx) => {
                html += `
                    <div class="snap-item carousel-item-img border">
                        ${isKDP ? `<div class="kdp-spine-overlay"></div>` : ''}
                        <img src="${src}" alt="Preview" loading="lazy">
                    </div>
                `;
            });

            html += `
                    </div>
                    <button onclick="scrollCarousel('${carouselId}', 'left')" class="scroll-arrow left"><i class="fa-solid fa-chevron-left small"></i></button>
                    <button onclick="scrollCarousel('${carouselId}', 'right')" class="scroll-arrow right"><i class="fa-solid fa-chevron-right small"></i></button>
                </div>
            `;

            html += `
                <div class="d-flex flex-column px-2 pb-2">
                    <div class="d-flex justify-content-between align-items-start mb-2 gap-2">
                        <h3 class="font-serif fw-medium m-0" style="font-size: 1.3rem; line-height: 1.2;">${product.title}</h3>
                        <span class="fw-semibold m-0" style="font-size: 1.25rem;">${data.price}</span>
                    </div>
                    <p class="text-muted fw-semibold mb-3" style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">${data.pages}</p>
                    <p class="text-muted mb-4" style="font-size: 14px; line-height: 1.6;">${data.desc}</p>
                    
                    <div class="d-flex flex-column gap-3 mt-auto pt-2">
                        <div class="d-flex gap-2">
                            <a href="#preview-${data.id}" class="flex-fill btn-action btn-outline-custom py-3" style="font-size:13px;">Preview</a>
                            ${!isKDP ? `<a href="#sample-${data.id}" class="flex-fill btn-action btn-outline-brand py-3" style="font-size:13px;">Free Sample</a>` : ''}
                        </div>
                        
                        ${!isKDP ? `
                            <a href="#buy-${data.id}" class="btn-action btn-dark-action py-3" style="font-size: 14px;"><i class=\"fa-solid fa-cart-shopping\"></i> Purchase PDF</a>
                        ` : `
                            <a href="#amazon-${data.id}" class="btn-action btn-amazon py-3" style="font-size: 14px;"><i class=\"fa-solid fa-book\"></i> Amazon KDP</a>
                        `}
                    </div>
                </div>
            </div>`;

            return html;
        }

        // ==========================================
        // UI HELPERS
        // ==========================================
        function setCardFormat(groupId, format) {
            cardFormats[groupId] = format;
            renderRelatedFeed();
        }

        function scrollCarousel(id, direction) {
            const el = document.getElementById(id);
            if (el) {
                const scrollAmount = el.clientWidth * 0.8;
                el.scrollBy({ left: direction === 'left' ? -scrollAmount : scrollAmount, behavior: 'smooth' });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
